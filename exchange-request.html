<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exchange Request</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

  <header class="header">
    <div class="top-title">
      <div class="logo">♻️</div>
      <h1>Exchange Request</h1>
    </div>
  </header>

  <section class="hero">

    <div class="form-card">

      <h2>📨 Send Request</h2>

      <form>

        <input type="text" placeholder="Waste ID" required />
        <input type="text" placeholder="Your Name" required />
        <input type="number" placeholder="Quantity Needed" required />

        <textarea placeholder="Message to seller"></textarea>

        <button class="btn">Send Request</button>

      </form>

    </div>

  </section>

</div>

</body>
</html>
